# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------
title: Jiayang Lu
first_name: Jiayang
last_name: Lu
email: jiayanglu123@gmail.com
description: >
  PhD Applicant | AI for Medical & Biological Applications |
  MSc Health Data Science, University of Manchester
url: https://jiayangds.github.io
baseurl: "" # leave empty if repo is username.github.io

# Set to your timezone
timezone: Europe/London

# Language
lang: en

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------
# al-folio supports light and dark mode — keep both enabled
theme: al-folio

# -----------------------------------------------------------------------------
# Social / Contact
# -----------------------------------------------------------------------------
github_username:   JiayangDS   # e.g. jiayanglu
linkedin_username: jiayanglu123          # e.g. jiayang-lu
scholar_userid:    Vacsjz4AAAAJ        # from Google Scholar URL: ?user=XXXX

# Set to false to hide address block
display_address: false

# Your email in the footer (obfuscated by default)
contact_note: >
  Feel free to reach out regarding research collaborations or PhD opportunities.

# -----------------------------------------------------------------------------
# Author highlighting in publications
# -----------------------------------------------------------------------------
scholar:
  last_name: Lu
  first_name: Jiayang, J.

# -----------------------------------------------------------------------------
# Navbar pages
# -----------------------------------------------------------------------------
nav_order:
  - title: Home
    url: /
  - title: Publications
    url: /publications/
  - title: Academic
    url: /academic/
  - title: Creative
    url: /creative/
  - title: CV
    url: /cv/

# -----------------------------------------------------------------------------
# Blog / News (disabled — we're keeping the site lean)
# -----------------------------------------------------------------------------
blog_name: ""
blog_nav_title: ""

announcements:
  enabled: false

latest_posts:
  enabled: false

# -----------------------------------------------------------------------------
# SEO & Open Graph (important for PhD supervisor outreach)
# -----------------------------------------------------------------------------
og_image: /assets/img/prof_pic.jpg  # used as social preview image

# Google Analytics — add your ID after setting up
google_analytics: "Vacsjz4AAAAJ"  # e.g. G-XXXXXXXXXX

# -----------------------------------------------------------------------------
# Accent colour — matched to DINO-3DRA project page
# (also set in _sass/_custom.scss for deeper overrides)
# -----------------------------------------------------------------------------
# al-folio uses Bootstrap; accent is mainly controlled via SCSS

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  news:
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

# -----------------------------------------------------------------------------
# Defaults
# -----------------------------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: news
    values:
      layout: post
  - scope:
      path: ""
      type: projects
    values:
      layout: page
